<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COBRA Alternatives</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1>Just Lost Your Job?</h1>
    <h2>See Cheaper Alternatives to COBRA in 60 Seconds</h2>

    <form id="leadForm">
      <input id="full_name" type="text" placeholder="Full Name" required />
      <input id="phone" type="tel" placeholder="Phone Number" required />
      <input id="email" type="email" placeholder="Email" required />

      <select id="coverage_type" required>
        <option value="">Coverage Type</option>
        <option value="Individual">Individual</option>
        <option value="Family">Family</option>
      </select>

      <button type="submit">Get My Options</button>
    </form>

    <p class="note">No spam. Licensed agents will contact you.</p>
    <p id="statusMessage" class="status"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="script.js"></script>
</body>
</html>
