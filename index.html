<form id="leadForm">
  <input id="full_name" type="text" placeholder="Full Name" required />
  <input id="phone" type="tel" placeholder="Phone Number" required />
  <input id="email" type="email" placeholder="Email" required />

  <select id="coverage_type" required>
    <option value="">Who needs coverage?</option>
    <option value="individual">Just me</option>
    <option value="family">Family</option>
  </select>

  <select id="urgency" required>
    <option value="">How soon do you need coverage?</option>
    <option value="immediately">Immediately</option>
    <option value="1-2 weeks">1–2 weeks</option>
    <option value="just exploring">Just exploring</option>
  </select>

  <select id="current_status" required>
    <option value="">What best describes your situation?</option>
    <option value="lost job">Recently lost job</option>
    <option value="cobra too expensive">COBRA is too expensive</option>
    <option value="shopping options">Shopping for better options</option>
  </select>

  <select id="budget">
    <option value="">Monthly budget (optional)</option>
    <option value="under 200">Under $200</option>
    <option value="200-500">$200–$500</option>
    <option value="500+">$500+</option>
  </select>

  <button type="submit">Get My Options</button>
</form>
